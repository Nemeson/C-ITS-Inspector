name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pcap2kml_player/requirements.txt
          pip install pytest pytest-cov ruff mypy
      - name: Lint with ruff
        run: |
          ruff check pcap2kml_player tests
          ruff format --check pcap2kml_player tests
      - name: Type check with mypy
        run: |
          mypy pcap2kml_player --ignore-missing-imports
      - name: Run tests
        run: |
          pytest --cov=pcap2kml_player --cov-report=xml --cov-report=term -q
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
